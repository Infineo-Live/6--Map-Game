<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinio: Journey to Lanka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/start-screen.css">
    <link rel="stylesheet" href="css/journey-map.css">
    <link rel="stylesheet" href="css/gameplay.css">
    <link rel="stylesheet" href="css/node.css">
    <link rel="stylesheet" href="css/node-config.css">
    <link rel="stylesheet" href="css/path.css">
    <link rel="stylesheet" href="css/ravan.css">
    <link rel="stylesheet" href="css/result-screen.css">
</head>
<body>
    <div class="game-viewport">
        <div id="instruction-banner">
            <span class="banner-text">Click nodes to navigate Ravan to the Finish node</span>
        </div>

        <div id="start-screen" class="screen active">
            <div class="screen-background start-background active"></div>
            <div class="screen-content">
                <img src="assets/images/ui/title.png" alt="Infinio Title Logo" class="title-logo">
                <button id="start-button" class="game-button start-button-image">
                    <img src="assets/images/ui/start-btn.png" alt="Start Game">
                </button>
            </div>
        </div>

        <div id="journey-map-screen" class="screen hidden">
            <div class="screen-background journey-map-background-underlay"></div>
            <div class="screen-background journey-map-background-overlay"></div>
            <div class="screen-content">
                <div class="map-pulse-container pulsing">
                    <img id="map-scroll-item" src="assets/images/map/map.png" alt="Ancient Scroll Map">
                </div>
                <button id="continue-button" class="game-button continue-button-image hidden">
                    <img src="assets/images/ui/continue-btn.png" alt="Continue Journey">
                </button>
            </div>
        </div>

        <div id="gameplay-screen" class="screen hidden">
            <div class="camera-viewport">
                <div class="game-board">
                    <svg class="path-overlay" xmlns="http://www.w3.org/2000/svg"></svg>

                    <div id="level-1" class="level-container">
                        <img src="assets/images/backgrounds/game-bg-1.png" alt="Level 1 Background" class="level-background">
                        <div class="nodes-container" id="level-1-nodes"></div>
                    </div>

                    <div id="cloud-barrier-container" class="level-container">
                        <img src="assets/images/clouds/cloud-barrier.png" alt="Cloud Barrier Divider" class="level-background cloud-barrier-image">
                    </div>

                    <div id="level-2" class="level-container">
                        <img src="assets/images/backgrounds/game-bg-2.png" alt="Level 2 Background" class="level-background">
                        <div class="nodes-container" id="level-2-nodes"></div>
                    </div>

                    <div id="ravan-character" class="ravan-sprite">
                        <img src="assets/images/characters/ravan-1.png" alt="Ravan Avatar">
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="screen hidden">
            <div class="screen-background result-background"></div>
            <div class="screen-content">
                <img src="assets/images/ui/result-text.png" alt="To Be Continued" class="result-text-image">
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
